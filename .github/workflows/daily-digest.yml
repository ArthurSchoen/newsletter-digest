name: Daily Newsletter Digest

on:
  schedule:
    # Target: ~9 AM Boston (EDT). GitHub Actions cron is delayed 2-3h,
    # so we schedule at 10:30 UTC to compensate.
    # 10:30 UTC + ~2.5h delay ≈ 13:00 UTC = 9:00 AM EDT
    # Adjust to 11:30 UTC for EST (November–March).
    - cron: '30 10 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python Newsletter_API.py
